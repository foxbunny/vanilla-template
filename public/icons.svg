<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
	<!-- A sprite of stroke icons on a 24x24 grid. Colour and stroke width come
	     from common.css (currentColor plus the icon-scale custom property), so
	     paths carry geometry only. Use one with <x-icon name="plus">; add one
	     with a new <symbol id="icon-NAME">. An XML comment can't contain a
	     double hyphen, so don't write the property with its leading dashes
	     here — the gallery parses this file as strict XML and would choke. -->

	<symbol id="icon-plus" viewBox="0 0 24 24">
		<line x1="12" y1="5" x2="12" y2="19"/>
		<line x1="5" y1="12" x2="19" y2="12"/>
	</symbol>

	<symbol id="icon-minus" viewBox="0 0 24 24">
		<line x1="5" y1="12" x2="19" y2="12"/>
	</symbol>

	<symbol id="icon-check" viewBox="0 0 24 24">
		<polyline points="20 6 9 17 4 12"/>
	</symbol>

	<symbol id="icon-x" viewBox="0 0 24 24">
		<line x1="18" y1="6" x2="6" y2="18"/>
		<line x1="6" y1="6" x2="18" y2="18"/>
	</symbol>

	<symbol id="icon-trash" viewBox="0 0 24 24">
		<polyline points="3 6 5 6 21 6"/>
