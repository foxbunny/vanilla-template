<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Tasks · Vanilla Template</title>
	<meta name="description" content="A local-first task list in a real app shell — the canonical example page.">

	<link rel="stylesheet" href="common.css">
	<link rel="stylesheet" href="index.css">
	<link rel="icon" href="icons.svg#icon-check">
	<link rel="manifest" href="manifest.json">
	<script type="module" src="index.js"></script>
</head>
<body>

<!-- The app shell: a top bar, a left nav, and the main content. On a narrow
     screen the nav becomes a drawer; whether it's open is a data-* on the shell
     that JS flips and CSS animates — no layout logic in JS. -->
<div class="app-shell" data-part="shell" data-sidebar="closed">

	<header class="app-header">
		<button class="icon-btn menu-toggle" data-variant="ghost" data-part="menu-toggle"
			aria-label="Toggle menu">
			<x-icon name="menu"></x-icon>
		</button>

		<a class="brand" href="index.html">
			<x-icon name="check"></x-icon>
			<span>Vanilla</span>
		</a>

		<div class="header-actions">
			<button class="icon-btn" data-variant="ghost" aria-label="Notifications">
				<x-icon name="bell"></x-icon>
			</button>
			<button class="icon-btn" data-variant="ghost" data-part="theme-toggle" aria-label="Toggle theme">
				<x-icon name="moon"></x-icon>
			</button>
			<button class="icon-btn" data-variant="ghost" aria-label="Account">
				<x-icon name="user"></x-icon>
			</button>
		</div>
	</header>

	<!-- Left nav. Real links in a list, one HTML file per page — no router. The
	     page we're on is a plain <span>, not a link. -->
	<aside class="sidebar">
		<nav class="side-nav" aria-label="Primary">
			<ul class="flow">
				<li><span><x-icon name="check"></x-icon> Tasks</span></li>
				<li><a href="examples/index.html"><x-icon name="star"></x-icon> Examples</a></li>
				<li><a href="design-system.html"><x-icon name="heart"></x-icon> Design System</a></li>
			</ul>
		</nav>
	</aside>

	<!-- Tap-to-close backdrop behind the open drawer (narrow screens only). -->
	<div class="overlay" data-part="overlay"></div>

	<main class="content">
		<div class="content-inner flow">

			<header class="content-head">
				<h1>Tasks</h1>
				<p class="muted">Saved in this browser. Works offline. Open a second tab —
					they stay in sync.</p>
			</header>

			<!-- Add. A plain <form>: Enter submits, `required` blocks empty. -->
			<form class="add-form" data-part="add-form">
				<input data-part="new-text" name="text" placeholder="Add a task…"
					required autocomplete="off" aria-label="New task">
				<button data-variant="primary" aria-label="Add">
					<x-icon name="plus"></x-icon>
				</button>
			</form>

			<!-- Filter. Each is a link to the same page with a query param — real
			     URLs, no router. All three stay links (clicking re-applies a
			     filter), so JS marks the active one with aria-current for anyone
			     who can't see the fill. -->
			<nav class="filters" data-part="filters" aria-label="Filter tasks">
				<ul>
					<li><a href="?filter=all">All</a></li>
					<li><a href="?filter=active">Active</a></li>
					<li><a href="?filter=done">Done</a></li>
				</ul>
			</nav>

			<ul class="task-list flow" data-part="list"></ul>

			<p class="empty" data-part="empty" hidden>Nothing here yet.</p>

		</div>
	</main>

</div>

<!-- Row shape for the reconciler. Cloned per task; [data-part] fields filled. -->
<template data-part="row-template">
	<li class="task">
		<label class="task-check">
			<input type="checkbox" data-part="done" aria-label="Done">
		</label>
		<span class="task-text" data-part="text"></span>
		<button class="task-action" data-part="edit" data-variant="ghost" aria-label="Edit">
			<x-icon name="edit"></x-icon>
		</button>
		<button class="task-action" data-part="remove" data-variant="ghost" aria-label="Delete">
			<x-icon name="trash"></x-icon>
		</button>
	</li>
</template>

<!-- Edit dialog. Native <dialog>; submits with method="dialog". -->
<dialog data-part="edit-dialog">
	<form method="dialog" class="flow" data-part="edit-form">
		<h2>Edit task</h2>
		<label>
			<span>Text</span>
			<input name="text" data-part="edit-text" required>
		</label>
		<div class="row">
			<button value="save" data-variant="primary">Save</button>
			<button value="cancel" data-variant="ghost" formnovalidate>Cancel</button>
		</div>
	</form>
</dialog>

</body>
</html>
