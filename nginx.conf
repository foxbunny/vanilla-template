server {
	listen 80;
	server_name localhost;
	root /usr/share/nginx/html;

	# Don't cache the service worker, so a new version is picked up on reload
	# instead of the browser holding onto the old one.
	location = /service-worker.js {
		add_header Cache-Control "no-cache";
	}

	# Everything else is a plain static file. Real files only — each page
	# (index.html, design-system.html, examples/*.html) exists on disk.
	location / {
		try_files $uri $uri/ =404;
	}
}
